name: rezef-local

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cfo
      POSTGRES_USER: cfo
      POSTGRES_PASSWORD: cfo_local_password
    ports:
      - "5433:5432"
    volumes:
      - rezef_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cfo -d cfo"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - docker/env.docker.example
    environment:
      DATABASE_URL: postgresql+psycopg://cfo:cfo_local_password@db:5432/cfo
      APP_URL: http://localhost:8080
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://localhost:3001,http://127.0.0.1:8080
      AUTO_CREATE_DB: "false"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  rezef_postgres_data:
